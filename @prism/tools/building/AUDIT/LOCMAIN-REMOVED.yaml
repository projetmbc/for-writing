###
# Complete with one of the following regarding new palettes.
#
#    1) ''<alias>: renamed''
#
#    (the palette identifier has changed, requiring a mapping
#    from the old name to the new one)
#
#    2) ''<alias>: ignored''
#
#    (the palette exists but is intentionally excluded, using
#    a fictive mapping from the name to itself)
#
#    3) ''<alias>: superseded''
#
#    (the palette no longer exists but has a direct equivalent,
#    requiring a mapping from the old name to the new one).
#
#    4) ''<upset>: shift''
#
#    (the palette is shift of another).
#
#    5) ''<upset>: reverse_shift''
#
#    (the palette is reversal and shift of another).
###

# -- B -- #
BlueDarkOrange:
  BlueDarkOrange18: renamed

BlueOrange:
  BlueOrange12: renamed

# -- C -- #
Cubehelix:
  Classic: superseded

# -- G -- #
GrayTab:
  MidGray: renamed

Grays:
  Greys: superseded

# -- T -- #
Tableau:
  Tableau: ignored

TwilightShifted:
  Twilight: reverse_shift
