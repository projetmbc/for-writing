# Optimizing data weight: 4-decimal precision exceeds human visual
# acuity and ensures 8-bit color integrity.
PRECISION: 4


# We associate each category with allowed alias.
CATEGORY:
  colorblind:
    alias: # No alias.
    desc: |
      Palettes specifically designed to be accessible to people with color vision deficiency (CVD), ensuring high contrast and legibility.

  divergent:
    alias:
      - div
      - diverging
    desc: |
      Used for data with a natural midpoint (e.g., zero, average, or neutral). Colors diverge from the center towards two different extremes.

  qualitative:
    alias:
      - qual
      - discrete
    desc: |
      Best for categorical or nominal data where no order is implied (e.g., different labels, groups, or names).

  sequential:
    alias:
      - seq
    desc: |
      Ideal for data that follows a logical order from low to high value. Usually based on a single hue or multiple hues with increasing lightness.

  cyclic:
    alias: # No alias.
    desc: |
      For data that repeats periodically (e.g., 24h time, angles, or seasons). The start and end colors are identical to create a seamless loop.

  dark:
    alias: # No alias.
    desc: |
      High-contrast palettes optimized for terminal interfaces or applications using dark backgrounds.
