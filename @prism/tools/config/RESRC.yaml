# ------- #
# -- S -- #
# ------- #

SCICOLMAPS:
  name: Scientific Colour Maps
  url : https://zenodo.org/api/records/8409685/files-archive
  desc  : |
    F. Crameri's perceptually uniform and fair scientific color schemes are perceptually uniform palettes designed for scientific visualization. They are colour-blind friendly, greyscale-readable, and based on CET methodology.
  alias:
    - scientific


SCIVIZ:
  name  : SciViz
  inside: COLORMAPS
  desc  : |
    SciViz colormaps are perceptually uniform scales engineered in CIELAB/CAM02 space to ensure data-to-color linearity. They eliminate visual artifacts (false contours), guarantee color-blind accessibility, and are specifically optimized for 3D surface shading and high-dynamic-range scientific data.


