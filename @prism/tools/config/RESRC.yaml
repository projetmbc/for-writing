COLORCET:
  name  : ColorCET
  inside: COLORMAPS
  desc  : |
    The CET colour maps, developed by Peter Kovesi, aim to offer a large choice of the most common colour combinations in a wide variety of data formats. Many of the offered colour maps feature perceptual uniformity, although not all of them to the highest standards. The CET colour maps are continuous and cover sequential, diverging, and cyclic classes.


COLORBREWER:
  name  : Colorbrewer
  github: axismaps/colorbrewer
  desc  : |
    Classic cartographic palettes based on Cynthia Brewer's research


COLORMAPS:
  name  : Colormaps
  github: pratiman-91/colormaps
  desc  : |
    Curated collection of diverse colormaps for general scientific plotting


CUBEHELIX:
  name  : Cubehelix
  inside: PALETTABLE
  desc  : |
    Color schemes that transition to black/white linearly, maintaining readability when printed in grayscale


