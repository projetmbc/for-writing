<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Palette Lab Pro - Spectrum Edition</title>
  <link rel="stylesheet" href="./core/styles.css">
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🎨 Palette Studio</h1>
    <button class="btn-theme" onclick="toggleTheme()" id="themeBtn">🌓 Thème</button>
  </div>

  <div class="editor-grid">
    <div class="config-panel">
      <div>
        <label>Nom de la Palette</label>
        <input type="text" id="pName" value="Zissou" oninput="updateAll()">
      </div>
      <div>
        <label>Taille (N)</label>
        <input type="number" id="pSize" value="10" min="2" oninput="updateAll()">
      </div>
      <button class="btn-download" onclick="downloadCSS()">💾 Télécharger .css</button>
    </div>

    <div>
      <label>Couleurs (une par ligne)</label>
      <textarea id="pList" oninput="updateAll()">
rgb(0% 60% 90.196%)
rgb(3.1371% 39.7821% 65.7952%)
rgb(6.2744% 19.5642% 41.3943%)
rgb(36.3398% 16.9934% 26.1436%)
rgb(75.3812% 20.305% 13.9433%)
rgb(93.2461% 33.0283% 18.2135%)
rgb(89.9346% 55.1633% 38.9542%)
rgb(85.6644% 72.2875% 57.037%)
rgb(78.5185% 74.379% 67.1459%)
rgb(71.3725% 76.4705% 77.2549%)</textarea>
    </div>

    <div>
      <label>Notes / Commentaires CSS</label>
      <textarea id="pNotes" oninput="updateAll()" placeholder="Notes..."></textarea>
    </div>
  </div>

  <div class="viz-section">
    <label class="palette-label">Palette Discrète (cliquer pour éditer)</label>
    <div class="discrete-bar" id="palettePreview"></div>

    <label class="palette-label">Spectre Continu (Interpolation linéaire)</label>
    <div class="continuous-spectrum" id="spectrum"></div>

    <div class="viz-box">
      <svg id="canvas" viewBox="0 0 800 400"></svg>
    </div>
  </div>
</div>

<script type="text/javascript" src="./core/script.js"></script>

</body>
</html>
