<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <title>Palette Studio - Theme Support</title>

  <link rel  = "stylesheet"
        href = "../palettes.css">

  <link rel  = "stylesheet"
        href = "./core/styles.css">
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🎨 Palette Studio</h1>
    <button class="theme-switch" onclick="toggleTheme()" id="themeBtn">🌙 Mode Sombre</button>
  </div>

  <div id="tabsInterface" class="tabs-container"></div>

  <div class="hidden-inputs">
    <input type="text" id="pName">
    <input type="number" id="pSize">
  </div>

  <div id="resultArea" style="display:none">
    <h2 id="currentTitle" style="margin-bottom: 15px;"></h2>
    <div class="palette-preview" id="palettePreview"></div>
    <div class="spectrum-bar" id="continuousSpectrum"></div>

    <div class="viz-box">
      <svg id="canvas" width="800" height="400" viewBox="0 0 800 400"></svg>
    </div>
  </div>
</div>

<script src="./core/palettes.js"></script>
<script src="./core/graphic.js"></script>

</body>
</html>
