<!DOCTYPE html>

<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>🎨 @prism palette studio (Viewer)</title>

  <link rel  = "stylesheet"
        href = "./core/styles.css">

  <link id   = "dynamic-palette-css"
        rel  = "stylesheet"
        href = "">
</head>

<body>

<div class = "container">
  <div style = "display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
    <h1>🎨 @prism</h1>

    <div class = "nav-buttons">
      <button onclick = "pickRandom()"
              class   = "btn-tool">
        🎲 RANDOM
      </button>

      <button class   = "btn-tool"
              onclick = "document.body.classList.toggle('dark-mode')">
        🌓 THEME
      </button>
    </div>
  </div>

  <div class = "selector-engine">
    <div id    = "alphabetBar"
         class = "alphabet-bar">
    </div>

    <div id    = "scrollZone"
         class = "palette-scroll-zone">
    </div>
  </div>

  <div id    = "resultArea"
       style = "display:none">
    <div style = "display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;">
      <h2 id    = "currentTitle"
          style = "font-size: 1rem;">
      </h2>

      <label id    = "colorCount"
             style = "margin-bottom:0;">
      </label>
    </div>

    <div class = "viz-box">
      <svg id      = "canvas"
           viewBox = "0 0 750 250">
      </svg>
    </div>

    <label>Spectrum</label>
    <div id    = "spectrum-preview"
         class = "spectrum-bar">
    </div>

    <label id = "palette-label">
      Palette
    </label>

    <div id    = "palette-preview"
         class = "palette-preview">
    </div>
  </div>
</div>

<script src="./core/palsizes.js"></script>
<script src="./core/graphic.js"></script>

</body>

</html>
