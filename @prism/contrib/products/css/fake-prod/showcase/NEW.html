<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>🎨 @prism palette studio - Final</title>

  <link rel="stylesheet" href="../palettes.css">
  <script src="./core/palettes.js"></script>

  <style>
    :root {
      --accent: #6366f1;
      --bg-page: #f0f2f5;
      --bg-container: #ffffff;
      --text-main: #1e293b;
      --border-color: #e2e8f0;
      /* Fond standard : gris très clair */
      --svg-bg: #f8fafc;
      --bar-bg: #f8fafc;
      --outline-color: rgba(0, 0, 0, 0.15);
    }

    body.dark-mode {
      --bg-page: #0f172a;
      --bg-container: #1e293b;
      --text-main: #f1f5f9;
      --border-color: #334155;
      /* Fond sombre : gris profond presque noir */
      --svg-bg: #0b0f1a;
      --bar-bg: #0b0f1a;
      --outline-color: rgba(255, 255, 255, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-page); color: var(--text-main); padding: 10px; transition: 0.3s; }

    .container {
      max-width: 900px; margin: 0 auto; background: var(--bg-container);
      padding: 15px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    /* --- SELECTEUR --- */
    .selector-engine {
      display: flex; flex-direction: column; border: 1px solid var(--border-color);
      border-radius: 10px; overflow: hidden; margin-bottom: 15px; background: rgba(0,0,0,0.02);
    }
    .alphabet-bar { display: flex; flex-wrap: wrap; gap: 1px; padding: 5px; background: var(--bg-container); border-bottom: 1px solid var(--border-color); }
    .letter-btn { flex: 1; min-width: 26px; padding: 4px 0; border: none; background: transparent; cursor: pointer; font-weight: bold; color: var(--text-main); border-radius: 4px; font-size: 0.7rem; }
    .letter-btn.active { background: var(--accent); color: white; }
    .letter-btn.disabled { opacity: 0.1; cursor: default; }

    .palette-scroll-zone { height: 130px; overflow-y: auto; padding: 8px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; scroll-behavior: smooth; }
    .palette-choice { padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-container); color: var(--text-main); cursor: pointer; text-align: left; height: 4.2em; display: flex; flex-direction: column; justify-content: center; transition: 0.2s; }
    .palette-choice.selected { border-color: var(--accent); background: rgba(99, 102, 241, 0.1); }
    .palette-choice strong { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.1; font-size: 0.8rem; }
    .palette-choice small { opacity: 0.5; font-size: 0.65rem; margin-top: 2px; }

    /* --- RENDU --- */
    #resultArea { margin-top: 5px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Spectre et Palette avec fond gris contrasté */
    .spectrum-bar {
      height: 34px; width: 100%; border-radius: 4px; margin-bottom: 12px;
      background-color: var(--bar-bg);
      border: 1px solid var(--outline-color);
      overflow: hidden;
    }

    .palette-preview { display: flex; gap: 2px; height: 34px; margin-bottom: 12px; }

    .swatch {
      flex: 1; border-radius: 2px;
      border: 1px solid var(--outline-color);
      background-color: var(--bar-bg);
    }

    .viz-box {
      border: 1px solid var(--border-color); border-radius: 12px;
      background: var(--svg-bg); padding: 10px; display: flex; justify-content: center; margin-top: 5px;
    }

    svg { width: 100%; height: auto; max-width: 750px; }
    label { font-size: 9px; font-weight: bold; letter-spacing: 0.05em; opacity: 0.5; text-transform: uppercase; display: block; margin-bottom: 3px; }
    h1 { font-size: 1.2rem; color: var(--accent); }

    .nav-buttons { display: flex; gap: 8px; }
    .btn-tool { padding: 4px 12px; font-size: 0.7rem; font-weight: bold; cursor: pointer; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-container); color: var(--text-main); transition: 0.2s; }
    .btn-tool:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<div class="container">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
    <h1>🎨 @prism</h1>
    <div class="nav-buttons">
      <button onclick="pickRandom()" class="btn-tool">🎲 RANDOM</button>
      <button onclick="document.body.classList.toggle('dark-mode')" class="btn-tool">🌓 THEME</button>
    </div>
  </div>

  <div class="selector-engine">
    <div id="alphabetBar" class="alphabet-bar"></div>
    <div id="scrollZone" class="palette-scroll-zone"></div>
  </div>

  <div id="resultArea" style="display:none">
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;">
      <h2 id="currentTitle" style="font-size: 1rem;"></h2>
      <label id="colorCount" style="margin-bottom:0;"></label>
    </div>

    <label>Spectre de Gradient</label>
    <div class="spectrum-bar" id="continuousSpectrum"></div>

    <label>Échantillons discrets</label>
    <div class="palette-preview" id="palettePreview"></div>

    <div class="viz-box">
      <svg id="canvas" viewBox="0 0 750 250"></svg>
    </div>
  </div>
</div>

<script>
function initInterface() {
  const alphaBar = document.getElementById('alphabetBar');
  if (typeof palsize === 'undefined') return;

  const availableLetters = [...new Set(Object.keys(palsize).map(name => name[0].toUpperCase()))];
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(L => {
    const btn = document.createElement('button');
    btn.className = `letter-btn ${availableLetters.includes(L) ? '' : 'disabled'}`;
    btn.id = `btn-letter-${L}`;
    btn.textContent = L;
    if (!btn.classList.contains('disabled')) btn.onclick = () => filterByLetter(L, btn);
    alphaBar.appendChild(btn);
  });
  const first = document.querySelector('.letter-btn:not(.disabled)');
  if (first) first.click();
}

function filterByLetter(letter, btn, targetPalette = null) {
  document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const scrollZone = document.getElementById('scrollZone');
  scrollZone.innerHTML = '';
  const matches = Object.keys(palsize).filter(name => name[0].toUpperCase() === letter).sort();

  matches.forEach(name => {
    const pBtn = document.createElement('button');
    pBtn.className = `palette-choice ${targetPalette === name ? 'selected' : ''}`;
    pBtn.innerHTML = `<strong>${name}</strong><small>${palsize[name]} tons</small>`;
    pBtn.onclick = () => selectPalette(name, palsize[name], pBtn);
    scrollZone.appendChild(pBtn);
    if(targetPalette === name) setTimeout(() => pBtn.scrollIntoView({ block: 'nearest' }), 50);
  });
}

function pickRandom() {
    const keys = Object.keys(palsize);
    const key = keys[Math.floor(Math.random() * keys.length)];
    const letterBtn = document.getElementById(`btn-letter-${key[0].toUpperCase()}`);
    filterByLetter(key[0].toUpperCase(), letterBtn, key);
    selectPalette(key, palsize[key]);
}

function selectPalette(nom, taille, btnElement = null) {
  document.querySelectorAll('.palette-choice').forEach(b => b.classList.remove('selected'));
  if(btnElement) btnElement.classList.add('selected');
  document.getElementById('currentTitle').textContent = nom;
  document.getElementById('colorCount').textContent = `${taille} couleurs`;
  document.getElementById('resultArea').style.display = 'block';
  draw(nom, taille);
}

function draw(name, size) {
  const colors = [];
  for (let i = 1; i <= size; i++) colors.push(`var(--pal${name}-${i})`);

  document.getElementById('palettePreview').innerHTML = colors.map(c => `<div class="swatch" style="background:${c}"></div>`).join('');
  document.getElementById('continuousSpectrum').style.background = `linear-gradient(90deg, ${colors.join(', ')})`;

  const svg = document.getElementById('canvas');
  svg.innerHTML = '';
  const centerY = 125, circleX = 130, waveStartX = 280, maxR = 100;

  colors.forEach((c, i) => {
    // Cercles
    const circ = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circ.setAttribute("cx", circleX); circ.setAttribute("cy", centerY);
    circ.setAttribute("r", maxR - (i * (maxR/size)));
    circ.setAttribute("fill", c);
    svg.appendChild(circ);

    // Ondes
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    const yBase = centerY + (i * 7) - (size * 3.5);
    let d = `M ${waveStartX} ${yBase + Math.sin(i) * 40}`;
    for (let x = 1; x <= 440; x += 2) d += ` L ${waveStartX + x} ${yBase + Math.sin(x * 0.04 + i) * 40}`;
    path.setAttribute("d", d); path.setAttribute("stroke", c);
    path.setAttribute("fill", "none"); path.setAttribute("stroke-width", "4");
    path.setAttribute("stroke-linecap", "round");
    svg.appendChild(path);
  });
}

window.onload = initInterface;
</script>
</body>
</html>
