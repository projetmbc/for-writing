<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Palette Studio - Theme Support</title>
  <link rel="stylesheet" href="./core/styles.css">
  <link rel="stylesheet" href="../palettes.css">
</head>
<body class="">

<div class="container">
  <div class="header">
    <h1>🎨 Palette Studio</h1>
    <button class="theme-switch" onclick="toggleTheme()" id="themeBtn">🌙 Mode Sombre</button>
  </div>

  <div class="controls">
    <div class="field">
      <label>Nom de la Palette</label>
      <input type="text" id="pName" placeholder="Accent" value="Accent">
    </div>
    <div class="field">
      <label>Nombre de couleurs</label>
      <input type="number" id="pSize" value="10" min="1">
    </div>
    <button class="btn-gen" onclick="draw()">Générer</button>
  </div>

  <div id="resultArea" style="display:none">
    <div class="palette-preview" id="palettePreview"></div>
    <div class="spectrum-bar" id="continuousSpectrum"></div>

    <div class="viz-box">
      <svg id="canvas" width="800" height="400" viewBox="0 0 800 400"></svg>
    </div>
  </div>
</div>

<script type="text/javascript" src="./core/script.js"></script>

</body>
</html>
