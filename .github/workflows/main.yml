name: Build showcase PDFs

# Configuration variables
env:
  TEXLIVE_PACKAGES: "tutodoc pdfpages"
  LUADRAW_REPO: "https://github.com/pfradin/luadraw.git"
  BUILD_SCRIPT: "./@prism/tools/building/PARASHOWCASE.sh"
  ULIMIT_FILES: "2048"

permissions:
  contents: write

on:
  push:
    branches: [ actions ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install TeX Live and packages
      run: |
        sudo apt-get update

        # Install TeX Live with commonly needed packages
        sudo apt-get install -y \
          texlive-base \
          texlive-luatex \
          texlive-latex-extra \
          texlive-latex-recommended \
          texlive-fonts-recommended \
          texlive-fonts-extra \
          texlive-science \
          latexmk

        # Install tutodoc and pdfpages if not already included
        # Note: pdfpages is usually in texlive-latex-extra
        # tutodoc might need manual installation

        # Check if tlmgr is available and configured
        if command -v tlmgr &>/dev/null; then
          # Initialize tlmgr for user mode
          tlmgr init-usertree || true

          # Try to update and install packages
          tlmgr update --self --all 2>/dev/null || echo "tlmgr update skipped"
          tlmgr install tutodoc 2>/dev/null || echo "tutodoc may already be installed"
        else
          echo "tlmgr not available, packages should be in texlive-latex-extra"
        fi

    - name: Install luadraw
      run: |
        # Clone le projet luadraw
        git clone https://github.com/pfradin/luadraw.git /tmp/luadraw

        # Trouver le répertoire TEXMFHOME
        TEXMFHOME=$(kpsewhich -var-value TEXMFHOME)
        echo "TEXMFHOME: $TEXMFHOME"

        # Créer les répertoires nécessaires
        mkdir -p "$TEXMFHOME/tex/lualatex/luadraw"

        # Copier les fichiers luadraw
        cp -r /tmp/luadraw/tex/* "$TEXMFHOME/tex/lualatex/luadraw/" 2>/dev/null || true

        # Si la structure est différente, copier tous les fichiers .sty et .lua
        find /tmp/luadraw -name "*.sty" -exec cp {} "$TEXMFHOME/tex/lualatex/luadraw/" \;
        find /tmp/luadraw -name "*.lua" -exec cp {} "$TEXMFHOME/tex/lualatex/luadraw/" \;

        # Mettre à jour la base de données TeX
        texhash "$TEXMFHOME"

        # Vérifier l'installation
        echo "Contenu de $TEXMFHOME/tex/lualatex/luadraw:"
        ls -la "$TEXMFHOME/tex/lualatex/luadraw/"

    - name: Make launch script executable
      run: chmod +x @prism/tools/building/PARASHOWCASE.sh

    - name: Run launch script
      run: ./@prism/tools/building/PARASHOWCASE.sh
      continue-on-error: true

    - name: Show failed compilations
      if: failure()
      run: |
        echo "Checking for log files..."
        find . -name "*.log" -type f -exec echo "=== {} ===" \; -exec tail -n 30 {} \;

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-outputs
        path: |
          **/*.pdf
          **/*.log
        if-no-files-found: warn
